<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE SALVAGER - The Sisters Plea</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #05050a;
            color: #e0e0ed;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #game-container {
            position: relative;
            width: 900px;
            height: 600px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8), 0 0 15px rgba(0, 150, 255, 0.2);
            border: 4px solid #1a1a2e;
            background: #000;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #020205;
        }
        /* Mobile Touch Controls Layer */
        #mobile-controls {
            display: none; /* Shown dynamically if mobile is detected or via toggle */
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 220px;
            pointer-events: none;
            z-index: 10;
        }
        .joystick-zone {
            position: absolute;
            bottom: 20px;
            width: 140px;
            height: 140px;
            background: rgba(255, 255, 255, 0.03);
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            pointer-events: auto;
        }
        #joystick-p1 { left: 30px; }
        #joystick-p2 { right: 30px; }
        .joystick-knob {
            position: absolute;
            top: 45px;
            left: 45px;
            width: 50px;
            height: 50px;
            background: rgba(255, 170, 0, 0.4);
            border: 2px solid rgba(255, 170, 0, 0.8);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 170, 0, 0.5);
            transform: translate(0, 0);
        }
        #joystick-p2 .joystick-knob {
            background: rgba(0, 240, 255, 0.4);
            border: 2px solid rgba(0, 240, 255, 0.8);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }
        .btn-zone {
            position: absolute;
            bottom: 20px;
            width: 140px;
            height: 140px;
            pointer-events: none;
        }
        #btns-p1 { left: 190px; }
        #btns-p2 { right: 190px; }
        .mbtn {
            position: absolute;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            color: #fff;
            font-weight: bold;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            cursor: pointer;
            text-shadow: 0 1px 2px #000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
        }
        .mbtn:active {
            transform: scale(0.92);
        }
        /* P1 Action Buttons */
        .btn-p1-att {
            background: rgba(255, 80, 0, 0.4);
            border: 2px solid rgba(255, 80, 0, 0.8);
            box-shadow: 0 0 8px rgba(255, 80, 0, 0.4);
            top: 10px;
            left: 42px;
        }
        .btn-p1-blk {
            background: rgba(255, 200, 0, 0.4);
            border: 2px solid rgba(255, 200, 0, 0.8);
            box-shadow: 0 0 8px rgba(255, 200, 0, 0.4);
            bottom: 10px;
            left: 42px;
        }
        /* P2 Action Buttons */
        .btn-p2-att {
            background: rgba(0, 180, 255, 0.4);
            border: 2px solid rgba(0, 180, 255, 0.8);
            box-shadow: 0 0 8px rgba(0, 180, 255, 0.4);
            top: 10px;
            left: 42px;
        }
        .btn-p2-dsh {
            background: rgba(180, 0, 255, 0.4);
            border: 2px solid rgba(180, 0, 255, 0.8);
            box-shadow: 0 0 8px rgba(180, 0, 255, 0.4);
            bottom: 10px;
            left: 42px;
        }
        /* Helper Info overlay */
        #orientation-warning {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #05050a;
            z-index: 1000;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        @media (max-width: 950px), (max-height: 650px) {
            #game-container {
                width: 100vw;
                height: 66.67vw; /* Maintain 3:2 aspect ratio */
                max-width: 900px;
                max-height: 600px;
            }
        }
        @media (orientation: portrait) and (max-width: 600px) {
            #orientation-warning {
                display: flex;
            }
        }
    </style>
</head>
<body>

    <div id="orientation-warning">
        <div>
            <h2>Rotate Your Device</h2>
            <p style="margin-top: 10px; color: #888;">Please rotate your device to landscape mode to play THE SALVAGER.</p>
        </div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="900" height="600"></canvas>
        
        <!-- Touch Overlay for Mobile/Tablets -->
        <div id="mobile-controls">
            <!-- Player 1 Joystick & Buttons (Zeke) -->
            <div class="joystick-zone" id="joystick-p1">
                <div class="joystick-knob" id="knob-p1"></div>
            </div>
            <div class="btn-zone" id="btns-p1">
                <div class="mbtn btn-p1-att" id="btn-f">F (ATT)</div>
                <div class="mbtn btn-p1-blk" id="btn-g">G (BLK)</div>
            </div>

            <!-- Player 2 Joystick & Buttons (Maya) -->
            <div class="joystick-zone" id="joystick-p2">
                <div class="joystick-knob" id="knob-p2"></div>
            </div>
            <div class="btn-zone" id="btns-p2">
                <div class="mbtn btn-p2-att" id="btn-att2">. (ATT)</div>
                <div class="mbtn btn-p2-dsh" id="btn-dash2">/ (DSH)</div>
            </div>
        </div>
    </div>

    <script>
        // --- SOUND & WEB AUDIO SYSTEM ---
        class SoundEngine {
            constructor() {
                this.ctx = null;
                this.muted = false;
                this.isInitialized = false;
            }

            init() {
                if (this.isInitialized) return;
                try {
                    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                    this.ctx = new AudioContextClass();
                    this.isInitialized = true;
                    this.startRain();
                    this.startHospitalHum();
                } catch(e) {
                    console.error("Audio initialization failed: ", e);
                }
            }

            resume() {
                if (this.ctx && this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            }

            toggleMute() {
                this.muted = !this.muted;
                if (this.muted) {
                    if (this.rainVolume) this.rainVolume.gain.setValueAtTime(0, this.ctx.currentTime);
                    if (this.humVolume) this.humVolume.gain.setValueAtTime(0, this.ctx.currentTime);
                } else {
                    this.resume();
                    if (this.rainVolume && game.levelIndex === 0) this.rainVolume.gain.setValueAtTime(0.12, this.ctx.currentTime);
                    if (this.humVolume && game.levelIndex === 2) this.humVolume.gain.setValueAtTime(0.08, this.ctx.currentTime);
                }
            }

            // Create procedural white noise
            createNoiseBuffer() {
                if (!this.ctx) return null;
                const bufferSize = this.ctx.sampleRate * 2;
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                return buffer;
            }

            startRain() {
                if (!this.ctx) return;
                const noise = this.ctx.createBufferSource();
                noise.buffer = this.createNoiseBuffer();
                noise.loop = true;

                const filter = this.ctx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.value = 1000;
                filter.Q.value = 1;

                this.rainVolume = this.ctx.createGain();
                this.rainVolume.gain.value = 0; // Starts at 0, updated by state

                noise.connect(filter);
                filter.connect(this.rainVolume);
                this.rainVolume.connect(this.ctx.destination);
                noise.start();
            }

            updateRainVolume(levelIndex) {
                if (!this.isInitialized || this.muted) return;
                const target = (levelIndex === 0 && game.state === 'PLAYING') ? 0.12 : 0;
                if (this.rainVolume) {
                    this.rainVolume.gain.setTargetAtTime(target, this.ctx.currentTime, 0.5);
                }
            }

            startHospitalHum() {
                if (!this.ctx) return;
                this.osc1 = this.ctx.createOscillator();
                this.osc2 = this.ctx.createOscillator();
                this.humVolume = this.ctx.createGain();
                
                this.osc1.type = 'sine';
                this.osc1.frequency.value = 60; // AC hum
                this.osc2.type = 'triangle';
                this.osc2.frequency.value = 62; // Slight beating

                this.humVolume.gain.value = 0;

                this.osc1.connect(this.humVolume);
                this.osc2.connect(this.humVolume);
                this.humVolume.connect(this.ctx.destination);

                this.osc1.start();
                this.osc2.start();
            }

            updateHumVolume(levelIndex) {
                if (!this.isInitialized || this.muted) return;
                const target = (levelIndex === 2 && game.state === 'PLAYING') ? 0.08 : 0;
                if (this.humVolume) {
                    this.humVolume.gain.setTargetAtTime(target, this.ctx.currentTime, 0.5);
                }
            }

            playHit() {
                if (!this.isInitialized || this.muted) return;
                this.resume();
                
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(140, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, this.ctx.currentTime + 0.12);

                gain.gain.setValueAtTime(0.35, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.12);

                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.13);
            }

            playDamage() {
                if (!this.isInitialized || this.muted) return;
                this.resume();

                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, this.ctx.currentTime);
                osc.frequency.setValueAtTime(80, this.ctx.currentTime + 0.08);

                gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.2);

                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.21);
            }

            playDefeated() {
                if (!this.isInitialized || this.muted) return;
                this.resume();

                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(250, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(60, this.ctx.currentTime + 0.3);

                gain.gain.setValueAtTime(0.25, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.32);

                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.33);
            }

            playLevelComplete() {
                if (!this.isInitialized || this.muted) return;
                this.resume();

                const now = this.ctx.currentTime;
                const notes = [130.81, 164.81, 196.00, 261.63, 329.63, 392.00, 523.25]; // C major arpeggio
                notes.forEach((freq, index) => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(freq, now + index * 0.08);
                    
                    gain.gain.setValueAtTime(0.18, now + index * 0.08);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + index * 0.08 + 0.3);
                    
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.start(now + index * 0.08);
                    osc.stop(now + index * 0.08 + 0.32);
                });
            }

            playGameOver() {
                if (!this.isInitialized || this.muted) return;
                this.resume();

                const now = this.ctx.currentTime;
                const notes = [110.00, 98.00, 87.31, 73.42]; // Sad descending tone steps
                notes.forEach((freq, index) => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(freq, now + index * 0.18);
                    
                    gain.gain.setValueAtTime(0.25, now + index * 0.18);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + index * 0.18 + 0.4);
                    
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.start(now + index * 0.18);
                    osc.stop(now + index * 0.18 + 0.42);
                });
            }

            playVictory() {
                if (!this.isInitialized || this.muted) return;
                this.resume();

                const now = this.ctx.currentTime;
                const notes = [261.63, 329.63, 392.00, 523.25, 392.00, 523.25, 659.25];
                notes.forEach((freq, index) => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, now + index * 0.14);
                    
                    gain.gain.setValueAtTime(0.15, now + index * 0.14);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + index * 0.14 + 0.4);
                    
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.start(now + index * 0.14);
                    osc.stop(now + index * 0.14 + 0.42);
                });
            }

            playFootstep() {
                if (!this.isInitialized || this.muted) return;
                this.resume();

                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(65, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(30, this.ctx.currentTime + 0.05);

                gain.gain.setValueAtTime(0.08, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.05);

                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.06);
            }
        }

        const sound = new SoundEngine();

        // --- GLOBAL CONFIG & GAME OBJECT ---
        const CANVAS_WIDTH = 900;
        const CANVAS_HEIGHT = 600;

        // ===== PRELOADED ART ASSETS =====
        const artImages = {};
        const artURLs = {
            bgLevel1: 'https://media.base44.com/images/public/69b1cf645256e83c174a7c51/1e53f0ed8_generated_image.png',
            bgLevel2: 'https://media.base44.com/images/public/69b1cf645256e83c174a7c51/57034ee1a_generated_image.png',
            bgLevel3: 'https://media.base44.com/images/public/69b1cf645256e83c174a7c51/647728b86_generated_image.png',
            panelIntro: 'https://media.base44.com/images/public/69b1cf645256e83c174a7c51/1878b6ade_20260303_112557.jpg',
            panelSisters: 'https://media.base44.com/images/public/69b1cf645256e83c174a7c51/04c1b0e11_generated_image.png',
            panelAlley: 'https://media.base44.com/images/public/69b1cf645256e83c174a7c51/4fd679329_generated_image.png',
            panelHospital: 'https://media.base44.com/images/public/69b1cf645256e83c174a7c51/d804ce710_generated_image.png',
            panelVictory: 'https://media.base44.com/images/public/69b1cf645256e83c174a7c51/a595dfb01_generated_image.png',
        };
        let artLoaded = 0;
        const artTotal = Object.keys(artURLs).length;
        for (const [key, url] of Object.entries(artURLs)) {
            artImages[key] = new Image();
            artImages[key].crossOrigin = 'anonymous';
            artImages[key].onload = () => { artLoaded++; };
            artImages[key].onerror = () => { artLoaded++; };
            artImages[key].src = url;
        }
        function artReady() { return artLoaded >= artTotal; }
        function drawArt(ctx, img, x, y, w, h, opacity) {
            if (img && img.complete && img.naturalWidth > 0) {
                ctx.save();
                if (opacity !== undefined) { ctx.globalAlpha = opacity; }
                ctx.drawImage(img, x, y, w, h);
                ctx.restore();
                return true;
            }
            return false;
        }

        const FLOOR_Y = 490;

        const keys = {};

        const game = {
            canvas: document.getElementById('gameCanvas'),
            ctx: document.getElementById('gameCanvas').getContext('2d'),
            state: 'TITLE', // TITLE, MODESELECT, INTRO, INTERSTITIAL, PLAYING, VICTORY, GAMEOVER
            mode: '1P', // '1P' or '2P'
            levelIndex: 0, // 0 = Halston Avenue, 1 = The Alley, 2 = Mercy General
            lives: 3,
            score: 0,
            highScore: parseInt(localStorage.getItem('salvager_high_score')) || 5000,
            paused: false,
            screenShake: 0,
            screenFlash: 0, // 0 to 1 intensity
            introCharIndex: 0,
            introText: "The sisters came at midnight. Marcus was dying. The Salvager never turns away a plea...",
            introTimer: 0,
            interstitialTimer: 0,
            cameraX: 0,
            players: [],
            enemies: [],
            particles: [],
            vfxs: [],
            marcus: null,
            level3Timer: 90, // seconds
            level3TimerMS: 0,
            activeP1: true, // For 1P switching. True means Zeke is active, False means Maya is active
            activeP2AI: true,
            waveIndex: 0,
            waveCooldown: 120, // frame delay between waves
            waveEnemiesSpawned: 0,
            waveEnemiesTotal: 0,
            levelFinished: false,
            levelFinishedTimer: 0,
            isMobile: false,

            // Parallax asset definitions (procedural layers)
            parallaxLayers: [],
            rainParticles: []
        };

        // --- PARALLAX & RAIN SETUP ---
        function initParallax() {
            game.parallaxLayers = [
                {
                    speed: 0.1,
                    color: '#080816',
                    rects: generateBuildings(15, 200, 450)
                },
                {
                    speed: 0.3,
                    color: '#101026',
                    rects: generateBuildings(18, 120, 350)
                },
                {
                    speed: 0.6,
                    color: '#151532',
                    rects: generateBuildings(22, 80, 220)
                }
            ];
            // Setup Rain System
            game.rainParticles = [];
            for (let i = 0; i < 120; i++) {
                game.rainParticles.push({
                    x: Math.random() * CANVAS_WIDTH,
                    y: Math.random() * CANVAS_HEIGHT,
                    speedY: 12 + Math.random() * 6,
                    speedX: -2 - Math.random() * 2,
                    len: 8 + Math.random() * 10
                });
            }
        }

        function generateBuildings(count, minWidth, minHeight) {
            const arr = [];
            let currentX = -300;
            for (let i = 0; i < count; i++) {
                const w = minWidth + Math.random() * 120;
                const h = minHeight + Math.random() * 200;
                arr.push({
                    x: currentX,
                    w: w,
                    h: h,
                    y: FLOOR_Y - h,
                    windows: generateWindows(w, h)
                });
                currentX += w - 20; // some overlap
            }
            return arr;
        }

        function generateWindows(w, h) {
            const list = [];
            const cols = Math.floor(w / 35);
            const rows = Math.floor(h / 45);
            for (let r = 1; r < rows - 1; r++) {
                for (let c = 1; c < cols - 1; c++) {
                    if (Math.random() > 0.4) {
                        list.push({
                            dx: c * 35,
                            dy: r * 45,
                            lit: Math.random() > 0.6,
                            amber: Math.random() > 0.4
                        });
                    }
                }
            }
            return list;
        }

        // --- ENTITY CLASSES ---

        class BaseCharacter {
            constructor(name, x, y, options) {
                this.name = name;
                this.x = x;
                this.y = y;
                this.w = 40;
                this.h = 90;
                this.vx = 0;
                this.vy = 0;
                this.speed = options.speed;
                this.maxHp = options.maxHp;
                this.hp = options.maxHp;
                this.atkDmg = options.atkDmg;
                this.color = options.color;
                this.rimColor = options.rimColor;
                this.attackRange = options.attackRange;
                this.attackCooldown = options.attackCooldown;
                
                this.dir = 1; // 1 = right, -1 = left
                this.atkTimer = 0;
                this.invulnTimer = 0;
                this.dashTimer = 0;
                this.dashCooldown = 0;
                this.isBlocking = false;
                this.isStaticAI = false;

                // Anim variables
                this.animTime = 0;
                this.isGrounded = true;
                this.lastFootstep = 0;
            }

            takeDamage(dmg, knockDir) {
                if (this.invulnTimer > 0) return;
                if (this.dashTimer > 0) return; // Invulnerable during dashes
                
                if (this.isBlocking && Math.sign(knockDir) !== Math.sign(this.dir)) {
                    // Reduce damage significantly from front blocks
                    dmg = Math.floor(dmg * 0.15);
                    game.screenShake = Math.max(game.screenShake, 2);
                } else {
                    game.screenShake = Math.max(game.screenShake, 8);
                    this.invulnTimer = 60; // 1 sec invuln frame
                    this.vx += knockDir * 10;
                    this.vy = -3;
                }

                this.hp -= dmg;
                if (this.hp < 0) this.hp = 0;
                game.screenFlash = 0.4;
                sound.playDamage();

                if (this.hp <= 0) {
                    // Check live reduction inside level update
                }
            }

            draw(ctx, isP1Active) {
                ctx.save();

                // Draw drop shadow on ground
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.beginPath();
                ctx.ellipse(this.x + this.w/2, FLOOR_Y, 20, 6, 0, 0, Math.PI * 2);
                ctx.fill();

                // Invulnerability flashing visual
                if (this.invulnTimer > 0 && Math.floor(this.invulnTimer / 4) % 2 === 0) {
                    ctx.restore();
                    return;
                }

                const walkCycle = Math.sin(this.animTime * 0.25);
                const isAttacking = this.atkTimer > 0;
                const isDashing = this.dashTimer > 0;
                const isBlocking = this.isBlocking;

                // Center coordinates
                const cx = this.x + this.w / 2;
                const cy = this.y + this.h / 2;

                // Outline glow / Rim lighting (essential for noir silhouette separation)
                ctx.shadowBlur = 12;
                ctx.shadowColor = this.rimColor;

                // For single player, highlight the active character slightly with ambient neon particles
                if (game.mode === '1P') {
                    if (isP1Active && this.name === "ZEKE") {
                        ctx.shadowBlur = 20;
                    } else if (!isP1Active && this.name === "MAYA") {
                        ctx.shadowBlur = 20;
                    }
                }

                // Render Base Shadow Silhouette (Detailed parts)
                ctx.fillStyle = '#0a0a0f';
                ctx.strokeStyle = this.rimColor;
                ctx.lineWidth = 2.5;

                // 1. LEGS & FEET
                const leftLegOffset = walkCycle * 14 * this.dir;
                const rightLegOffset = -walkCycle * 14 * this.dir;

                // Left Leg
                ctx.beginPath();
                ctx.moveTo(cx - 6, cy + 10);
                ctx.lineTo(cx - 10 + leftLegOffset, cy + 45);
                ctx.lineTo(cx - 4 + leftLegOffset, cy + 45);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                // Right Leg
                ctx.beginPath();
                ctx.moveTo(cx + 6, cy + 10);
                ctx.lineTo(cx + 10 + rightLegOffset, cy + 45);
                ctx.lineTo(cx + 16 + rightLegOffset, cy + 45);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                // 2. TORSO / COAT
                ctx.beginPath();
                if (this.name === "ZEKE") {
                    // Broad shoulders, long heavy trenchcoat
                    ctx.moveTo(cx - 16, cy - 20);
                    ctx.lineTo(cx + 16, cy - 20);
                    ctx.lineTo(cx + 12, cy + 20);
                    ctx.lineTo(cx - 12, cy + 20);
                } else {
                    // Slender jacket, athletic form
                    ctx.moveTo(cx - 10, cy - 20);
                    ctx.lineTo(cx + 10, cy - 20);

                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                // 3. ARMS
                // Back Arm
                ctx.beginPath();
                ctx.moveTo(cx - 14 * this.dir, cy - 18);

                    // Punch/Strike pose forward
                    ctx.lineTo(cx + (this.attackRange * 0.7) * this.dir, cy - 10);
                } else if (isBlocking) {
                    // Shielding face pose
                    ctx.lineTo(cx + 10 * this.dir, cy - 24);
                } else {
                    // Sway arms
                    ctx.lineTo(cx - 12 * this.dir - rightLegOffset * 0.5, cy + 10);
                }
                ctx.lineWidth = 4;
                ctx.stroke();

                // 4. HEAD & HAT/HAIR
                ctx.beginPath();
                ctx.arc(cx, cy - 32, 10, 0, Math.PI*2);
                ctx.fillStyle = '#050508';
                ctx.fill();
                ctx.stroke();

                if (this.name === "ZEKE") {
                    // Fedorhat brim & crown
                    ctx.fillStyle = '#020205';
                    ctx.beginPath();
                    ctx.ellipse(cx, cy - 38, 14, 3, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.stroke();

                    ctx.fillRect(cx - 7, cy - 46, 14, 8);
                    ctx.strokeRect(cx - 7, cy - 46, 14, 8);
                } else {
                    // Maya's sleek ponytail/hair silhouette
                    ctx.fillStyle = '#020205';
                    ctx.beginPath();
                    ctx.moveTo(cx - 6 * this.dir, cy - 32);
                    ctx.quadraticCurveTo(cx - 20 * this.dir, cy - 22, cx - 18 * this.dir, cy - 12);
                    ctx.lineWidth = 3;
                    ctx.stroke();
                }

                // Front Arm (Zeke holds coat / Maya swings gracefully)
                ctx.beginPath();
                ctx.moveTo(cx + 14 * this.dir, cy - 18);
                if (isAttacking) {
                    ctx.lineTo(cx + this.attackRange * this.dir, cy - 10);
                } else if (isBlocking) {
                    ctx.lineTo(cx + 12 * this.dir, cy - 28);
                } else {
                    ctx.lineTo(cx + 12 * this.dir + leftLegOffset * 0.5, cy + 10);
                }
                ctx.lineWidth = 4;
                ctx.stroke();

                ctx.restore();

            updateAnimation() {

        // --- ZEKE CHARACTER ---
        class Zeke extends BaseCharacter {
            constructor(x, y) {
                super("ZEKE", x, y, {
                    speed: 3.5,
                    maxHp: 120,
                    atkDmg: 30,
                    color: '#ffaa00',
                    rimColor: '#ffaa00',
                    attackRange: 60,
                    attackCooldown: 25
                });
            }

            updateControls() {
                this.isBlocking = false;
                
                // Active player controls
                if (game.mode === '2P' || game.activeP1) {
                    // Move
                    if (keys['KeyA']) {
                        this.vx = -this.speed;
                        this.dir = -1;
                    } else if (keys['KeyD']) {
                        this.vx = this.speed;
                        this.dir = 1;
                    } else {
                        this.vx = 0;
                    }

                    // Vertical movement for depth
                    if (keys['KeyW']) {
                        this.vy = -this.speed * 0.6;
                    } else if (keys['KeyS']) {
                        this.vy = this.speed * 0.6;
                    } else {
                        this.vy = 0;
                    }

                    // Block G (hold)
                    if (keys['KeyG']) {
                        this.isBlocking = true;
                        this.vx = 0;
                        this.vy = 0;
                    }

                    // Attack F
                    if (keys['KeyF'] && this.atkTimer === 0) {
                        this.atkTimer = this.attackCooldown;
                        this.triggerAttack();
                    }
                } else {
                    // Single-Player AI Mode (Zeke is companion)
                    this.runCompanionAI(game.players[1]); // Follow Maya
                }
            }

            triggerAttack() {
                sound.playHit();
                // Create sweeping attack particle
                game.vfxs.push({
                    x: this.x + (this.dir === 1 ? this.w : -this.attackRange),
                    y: this.y + 15,
                    w: this.attackRange,
                    h: 40,
                    life: 8,
                    maxLife: 8,
                    color: 'rgba(255, 170, 0, 0.6)',
                    dir: this.dir
                });

                // Hit detection on enemies
                const hitBox = {
                    x: this.dir === 1 ? this.x + this.w : this.x - this.attackRange,
                    y: this.y + 10,
                    w: this.attackRange,
                    h: 50
                };

                game.enemies.forEach(enemy => {
                    if (checkAABB(hitBox, enemy)) {
                        enemy.takeDamage(this.atkDmg, this.dir * 4);
                    }
                });
            }

            runCompanionAI(target) {
                // AI behavior: maintain safe distance, attack closest hostile
                const distToTarget = target.x - this.x;
                const closestEnemy = findClosestEnemy(this.x, this.y);

                if (closestEnemy && Math.abs(closestEnemy.x - this.x) < 200) {
                    // Move to enemy
                    const enemyDist = closestEnemy.x - this.x;
                    if (Math.abs(enemyDist) > this.attackRange - 15) {
                        this.vx = Math.sign(enemyDist) * this.speed * 0.8;
                        this.dir = Math.sign(enemyDist);
                    } else {
                        this.vx = 0;
                        if (this.atkTimer === 0) {
                            this.atkTimer = this.attackCooldown;
                            this.triggerAttack();
                        }
                    }
                    // Y tracking
                    const dy = closestEnemy.y - this.y;
                    if (Math.abs(dy) > 10) this.vy = Math.sign(dy) * this.speed * 0.5;
                    else this.vy = 0;
                } else {
                    // Follow core companion target
                    if (Math.abs(distToTarget) > 100) {
                        this.vx = Math.sign(distToTarget) * this.speed * 0.8;
                        this.dir = Math.sign(distToTarget);
                    } else {
                        this.vx = 0;
                    }

                    const targetDy = target.y - this.y;
                    if (Math.abs(targetDy) > 30) {
                        this.vy = Math.sign(targetDy) * this.speed * 0.5;
                    } else {
                        this.vy = 0;
                    }
                }
            }
        }

        // --- ENEMY CLASSES ---
        class Enemy {
            constructor(type, x, y) {
                this.type = type;
                this.x = x;
                this.y = y;
                
                // Custom configurations per type
                if (type === 'USHER') {
                    this.name = "USHER";
                    this.w = 38;
                    this.h = 88;
                    this.hp = 40;
                    this.maxHp = 40;
                    this.speed = 2.0;
                    this.dmg = 10;
                    this.rimColor = '#ff3333';
                    this.scale = 1.0;
                    this.hasVisionCone = true;
                } else if (type === 'BRUISER') {
                    this.name = "BRUISER";
                    this.w = 48;
                    this.h = 105;
                    this.hp = 80;
                    this.maxHp = 80;
                    this.speed = 1.3;
                    this.dmg = 20;
                    this.rimColor = '#ff0055';
                    this.scale = 1.25;
                    this.hasVisionCone = false;
                } else if (type === 'RUNNER') {
                    this.name = "RUNNER";
                    this.w = 30;
                    this.h = 75;
                    this.hp = 20;
                    this.maxHp = 20;
                    this.speed = 3.6;
                    this.dmg = 8;
                    this.rimColor = '#ff00aa';
                    this.scale = 0.85;
                    this.hasVisionCone = false;
                }

                this.vx = 0;
                this.vy = 0;
                this.dir = -1;
                this.flashTimer = 0;
                this.invulnTimer = 0;
                
                this.detectedPlayer = false;
                this.animTime = 0;
                this.atkCooldown = 0;
                this.patrolDir = -1;
                this.patrolOrigin = x;
            }

            takeDamage(dmg, knockDir) {
                this.hp -= dmg;
                if (this.hp < 0) this.hp = 0;
                this.flashTimer = 10;
                this.vx += knockDir;
                this.vy = -2;
                this.detectedPlayer = true; // Trigger aggro immediately on attack
                
                // Spawn hit spark particles
                for (let i = 0; i < 5; i++) {
                    game.particles.push({
                        x: this.x + this.w/2,
                        y: this.y + this.h/2,
                        vx: (Math.random() - 0.5) * 6,
                        vy: (Math.random() - 0.5) * 6,
                        life: 15,
                        color: this.rimColor
                    });
                }

                if (this.hp <= 0) {
                    game.score += (this.type === 'BRUISER' ? 300 : this.type === 'RUNNER' ? 150 : 100);
                    sound.playDefeated();
                }
            }

            update() {
                if (this.flashTimer > 0) this.flashTimer--;
                if (this.atkCooldown > 0) this.atkCooldown--;

                // Apply simple friction/physics
                this.x += this.vx;
                this.y += this.vy;

                this.vx *= 0.85;
                if (this.y < FLOOR_Y - this.h) {
                    this.vy += 0.4; // Gravity
                } else {
                    this.y = FLOOR_Y - this.h;
                    this.vy = 0;
                }

                this.animTime += Math.abs(this.vx) * 0.8 + 0.3;

                // Game Logic - AI Steering
                if (game.levelIndex === 0) {
                    // LEVEL 1: Stealth Patrol logic
                    if (!this.detectedPlayer) {
                        // Check if player is in sight
                        const targetPlayer = findClosestPlayer(this.x, this.y);
                        if (targetPlayer && this.hasVisionCone) {
                            const canSee = this.checkVision(targetPlayer);
                            if (canSee) {
                                this.detectedPlayer = true;
                            }
                        }

                        // Patrol movement
                        this.vx = this.patrolDir * this.speed * 0.5;
                        this.dir = this.patrolDir;
                        if (Math.abs(this.x - this.patrolOrigin) > 150) {
                            this.patrolDir *= -1;
                            this.patrolOrigin = this.x; // Shift origin to keep turning
                        }
                    } else {
                        // Aggressive chase nearest player
                        const target = findClosestPlayer(this.x, this.y);
                        if (target) {
                            const dx = target.x - this.x;
                            const dy = target.y - this.y;
                            this.vx = Math.sign(dx) * this.speed;
                            this.dir = Math.sign(dx);
                            if (Math.abs(dy) > 10) {
                                this.y += Math.sign(dy) * this.speed * 0.4;
                            }
                            this.tryAttack(target);
                        }
                    }
                } else if (game.levelIndex === 1) {
                    // LEVEL 2: Focus Marcus or closest player
                    // Runners prioritize Marcus over everything. Others fight players blocking path
                    let target = game.marcus;
                    if (this.type !== 'RUNNER') {
                        const targetPlayer = findClosestPlayer(this.x, this.y);
                        if (targetPlayer && Math.abs(targetPlayer.x - this.x) < 180) {
                            target = targetPlayer;
                        }
                    }

                    if (target) {
                        const dx = target.x - this.x;
                        const dy = target.y - this.y;
                        this.vx = Math.sign(dx) * this.speed;
                        this.dir = Math.sign(dx);
                        if (Math.abs(dy) > 10) {
                            this.y += Math.sign(dy) * this.speed * 0.4;
                        }
                        this.tryAttack(target);
                    }
                } else if (game.levelIndex === 2) {
                    // LEVEL 3: Corridors Chase
                    const target = findClosestPlayer(this.x, this.y);
                    if (target) {
                        const dx = target.x - this.x;
                        const dy = target.y - this.y;
                        this.vx = Math.sign(dx) * this.speed;
                        this.dir = Math.sign(dx);
                        if (Math.abs(dy) > 10) {
                            this.y += Math.sign(dy) * this.speed * 0.4;
                        }
                        this.tryAttack(target);
                    }
                }
            }

            checkVision(target) {
                const maxRange = 180;
                const dx = target.x - this.x;
                const dy = target.y - this.y;

                // Must be facing the player
                if (this.dir === 1 && dx < 0) return false;
                if (this.dir === -1 && dx > 0) return false;

                if (Math.abs(dx) < maxRange && Math.abs(dy) < 50) {
                    return true;
                }
                return false;
            }

            tryAttack(target) {
                if (this.atkCooldown > 0) return;

                const attackRange = 45;
                const hitBox = {
                    x: this.dir === 1 ? this.x + this.w : this.x - attackRange,
                    y: this.y + 10,
                    w: attackRange,
                    h: 50
                };

                if (checkAABB(hitBox, target)) {
                    target.takeDamage(this.dmg, this.dir * 4.5);
                    this.atkCooldown = 70; // Cool down
                }
            }

            draw(ctx) {
                ctx.save();

                // Ground drop shadow
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.beginPath();
                ctx.ellipse(this.x + this.w/2, FLOOR_Y, 20 * this.scale, 6 * this.scale, 0, 0, Math.PI * 2);
                ctx.fill();

                if (this.flashTimer > 0) {
                    // Flash pure white on damage
                    ctx.fillStyle = '#ffffff';
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#ffffff';
                    ctx.fillRect(this.x, this.y, this.w, this.h);
                    ctx.restore();
                    return;
                }

                const walkCycle = Math.sin(this.animTime * 0.2);
                const cx = this.x + this.w / 2;
                const cy = this.y + this.h / 2;

                ctx.shadowBlur = 10;
                ctx.shadowColor = this.rimColor;

                ctx.fillStyle = '#050508';
                ctx.strokeStyle = this.rimColor;
                ctx.lineWidth = 2.0;

                // Legs
                const lOffset = walkCycle * 10 * this.dir;
                ctx.beginPath();
                ctx.moveTo(cx - 5, cy + 10);
                ctx.lineTo(cx - 8 + lOffset, cy + 40);
                ctx.lineTo(cx - 2 + lOffset, cy + 40);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(cx + 5, cy + 10);
                ctx.lineTo(cx + 8 - lOffset, cy + 40);
                ctx.lineTo(cx + 14 - lOffset, cy + 40);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                // Torso / Coat
                ctx.beginPath();
                ctx.moveTo(cx - 12 * this.scale, cy - 20);
                ctx.lineTo(cx + 12 * this.scale, cy - 20);
                ctx.lineTo(cx + 8 * this.scale, cy + 20);
                ctx.lineTo(cx - 8 * this.scale, cy + 20);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                // Arms
                ctx.beginPath();
                ctx.moveTo(cx - 10 * this.dir, cy - 15);
                ctx.lineTo(cx - 14 * this.dir + lOffset * 0.5, cy + 12);
                ctx.lineWidth = 3.5;
                ctx.stroke();

                // Head
                ctx.beginPath();
                ctx.arc(cx, cy - 30, 8 * this.scale, 0, Math.PI*2);
                ctx.fill();
                ctx.stroke();

                // Fedora Hat Silhouette
                ctx.fillStyle = '#020205';
                ctx.beginPath();
                ctx.ellipse(cx, cy - 34, 12 * this.scale, 2.5 * this.scale, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.stroke();

                ctx.fillRect(cx - 6 * this.scale, cy - 41 * this.scale, 12 * this.scale, 7 * this.scale);
                ctx.strokeRect(cx - 6 * this.scale, cy - 41 * this.scale, 12 * this.scale, 7 * this.scale);

                // Front arm
                ctx.beginPath();
                ctx.moveTo(cx + 10 * this.dir, cy - 15);
                ctx.lineTo(cx + 12 * this.dir - lOffset * 0.5, cy + 12);
                ctx.lineWidth = 3.5;
                ctx.stroke();

                // Draw Health Bar above Enemy
                if (this.hp < this.maxHp) {
                    const barW = 35;
                    const barH = 4;
                    const bx = this.x + (this.w - barW)/2;
                    const by = this.y - 12;
                    ctx.fillStyle = 'rgba(0,0,0,0.6)';
                    ctx.fillRect(bx, by, barW, barH);
                    ctx.fillStyle = this.rimColor;
                    ctx.fillRect(bx, by, barW * (this.hp / this.maxHp), barH);
                }

                // Level 1: Draw Vision Cone
                if (game.levelIndex === 0 && this.hasVisionCone && !this.detectedPlayer) {
                    ctx.restore();
                    ctx.save();
                    const coneGrad = ctx.createLinearGradient(
                        this.dir === 1 ? this.x + this.w : this.x, 
                        this.y + 10, 
                        this.dir === 1 ? this.x + 200 : this.x - 200, 
                        this.y + 10
                    );
                    coneGrad.addColorStop(0, 'rgba(255, 50, 50, 0.22)');
                    coneGrad.addColorStop(1, 'rgba(255, 50, 50, 0.0)');
                    ctx.fillStyle = coneGrad;

                    ctx.beginPath();
                    ctx.moveTo(this.dir === 1 ? this.x + this.w : this.x, this.y + 10);
                    ctx.lineTo(this.dir === 1 ? this.x + 190 : this.x - 190, this.y - 30);
                    ctx.lineTo(this.dir === 1 ? this.x + 190 : this.x - 190, this.y + 60);
                    ctx.closePath();
                    ctx.fill();
                }

                ctx.restore();
            }
        }

                ctx.lineTo(this.x + 10, FLOOR_Y);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                ctx.restore();
            }
        }

        // --- GAME RESTART / INIT FUNCTIONS ---

        function initGame() {
            game.lives = 3;
            game.score = 0;
            game.levelIndex = 0;
            initLevel();
            sound.init();
        }

        function initLevel() {
            game.players = [];
            game.enemies = [];
            game.particles = [];
            game.vfxs = [];
            game.cameraX = 0;
            game.levelFinished = false;
            game.levelFinishedTimer = 0;

            sound.updateRainVolume(game.levelIndex);
            sound.updateHumVolume(game.levelIndex);

            // Zeke (Player 1)
            game.players.push(new Zeke(150, FLOOR_Y - 90));
            // Maya (Player 2)
            game.players.push(new Maya(220, FLOOR_Y - 90));

            if (game.levelIndex === 0) {
                // LEVEL 1: Stealth/Escort
                initParallax();
                // Spawn 6 Usher patrol enemies across the stage
                const patrolPoints = [650, 1000, 1350, 1750, 2100, 2500];
                patrolPoints.forEach(px => {
                    game.enemies.push(new Enemy('USHER', px, FLOOR_Y - 88));
                });
            } else if (game.levelIndex === 1) {
                // LEVEL 2: The Alley (Combat gauntlet)
                game.marcus = new Marcus();
                game.waveIndex = 0;
                game.waveCooldown = 120;
                game.waveEnemiesSpawned = 0;
                game.waveEnemiesTotal = 0;
                // Move players slightly right of Marcus
                game.players[0].x = 180;
                game.players[1].x = 240;
                triggerWave();
            } else if (game.levelIndex === 2) {
                // LEVEL 3: Hospital Interior Corridors Race
                game.level3Timer = 90;
                game.level3TimerMS = 0;
                // Place Forum Operatives at various distances
                const runnerPoints = [500, 950, 1300, 1750, 2200];
                const bruiserPoints = [700, 1150, 1600, 2050];
                const usherPoints = [400, 850, 1250, 1500, 1900];

                runnerPoints.forEach(px => {
                    game.enemies.push(new Enemy('RUNNER', px, FLOOR_Y - 75));
                });
                bruiserPoints.forEach(px => {
                    game.enemies.push(new Enemy('BRUISER', px, FLOOR_Y - 105));
                });
                usherPoints.forEach(px => {
                    game.enemies.push(new Enemy('USHER', px, FLOOR_Y - 88));
                });
            }
        }

        function triggerWave() {
            game.waveIndex++;
            game.waveEnemiesSpawned = 0;
            // Wave 1: 3 Ushers. Wave 2: 3 Ushers, 1 Runner. Wave 3: 2 Bruisers, 2 Runners.
            if (game.waveIndex === 1) {
                game.waveEnemiesTotal = 3;
            } else if (game.waveIndex === 2) {
                game.waveEnemiesTotal = 4;
            } else if (game.waveIndex === 3) {
                game.waveEnemiesTotal = 4;
            }
        }

        // --- COLLISION UTILS ---
        function checkAABB(rect1, rect2) {
            return rect1.x < rect2.x + rect2.w &&
                   rect1.x + rect1.w > rect2.x &&
                   rect1.y < rect2.y + rect2.h &&
                   rect1.y + rect1.h > rect2.y;
        }

        function findClosestEnemy(x, y) {
            let closest = null;
            let minDist = Infinity;
            game.enemies.forEach(e => {
                const d = Math.abs(e.x - x);
                if (d < minDist) {
                    minDist = d;
                    closest = e;
                }
            });
            return closest;
        }

        function findClosestPlayer(x, y) {
            let closest = null;
            let minDist = Infinity;
            game.players.forEach(p => {
                const d = Math.abs(p.x - x);
                if (d < minDist) {
                    minDist = d;
                    closest = p;
                }
            });
            return closest;
        }

        // --- UPDATE LOOP ---

        function update() {
            if (game.paused) return;

            // Decaying screen effects
            if (game.screenShake > 0) game.screenShake *= 0.88;
            if (game.screenFlash > 0) game.screenFlash -= 0.02;

            if (game.state === 'TITLE') {
                // Rain in title screen
                updateRainBackground();
            } else if (game.state === 'MODESELECT') {
                // Background updates
            } else if (game.state === 'INTRO') {
                game.introTimer++;
                if (game.introTimer % 4 === 0 && game.introCharIndex < game.introText.length) {
                    game.introCharIndex++;
                    sound.playFootstep(); // light typewriter sound tick
                }
            } else if (game.state === 'INTERSTITIAL') {
                game.interstitialTimer--;
                if (game.interstitialTimer <= 0) {
                    game.state = 'PLAYING';
                    initLevel();
                }
            } else if (game.state === 'PLAYING') {
                updatePlayingState();
            }
        }

        function updateRainBackground() {
            game.rainParticles.forEach(p => {
                p.y += p.speedY;
                p.x += p.speedX;
                if (p.y > CANVAS_HEIGHT) {
                    p.y = -20;
                    p.x = Math.random() * CANVAS_WIDTH;
                }
            });
        }

        function updatePlayingState() {
            // Update rain for Level 1
            if (game.levelIndex === 0) {
                updateRainBackground();
            }

            // LEVEL 3 TIMER TICK
            if (game.levelIndex === 2 && !game.levelFinished) {
                game.level3TimerMS += 16.67;
                if (game.level3TimerMS >= 1000) {
                    game.level3Timer--;
                    game.level3TimerMS = 0;
                    if (game.level3Timer <= 0) {
                        game.lives--;
                        if (game.lives <= 0) {
                            game.state = 'GAMEOVER';
                            sound.playGameOver();
                        } else {
                            initLevel();
                        }
                    }
                }
            }

            // UPDATE PLAYERS
            let activeLivingPlayerFound = false;
            game.players.forEach((p, index) => {
                if (p.invulnTimer > 0) p.invulnTimer--;
                if (p.atkTimer > 0) p.atkTimer--;
                if (p.dashTimer > 0) p.dashTimer--;
                if (p.dashCooldown > 0) p.dashCooldown--;

                // Update Control Routine
                p.updateControls();

                // Apply simple 2.5D physics constraints
                p.x += p.vx;
                p.y += p.vy;

                // Restrict depth placement (isometric layer floor boundaries)
                if (p.y < FLOOR_Y - p.h - 35) p.y = FLOOR_Y - p.h - 35;
                if (p.y > FLOOR_Y - p.h + 10) p.y = FLOOR_Y - p.h + 10;

                // Stop boundary clamping for side scrolling
                if (game.levelIndex === 0 || game.levelIndex === 2) {
                    // Prevent players moving back past camera viewport
                    if (p.x < game.cameraX + 10) p.x = game.cameraX + 10;
                } else {
                    // Level 2 Arena Boundaries
                    if (p.x < 15) p.x = 15;
                    if (p.x > CANVAS_WIDTH - p.w - 15) p.x = CANVAS_WIDTH - p.w - 15;
                }

                p.updateAnimation();

                if (p.hp > 0) activeLivingPlayerFound = true;
            });

            // If BOTH players dead, lose a life and respawn
            if (game.players[0].hp <= 0 && game.players[1].hp <= 0) {
                game.lives--;
                if (game.lives <= 0) {
                    game.state = 'GAMEOVER';
                    sound.playGameOver();
                } else {
                    initLevel();
                }
                return;
            }

            // CAMERA CAMERA SCROLL
            if (game.levelIndex === 0 || game.levelIndex === 2) {
                // Focus camera between active players, or follow the single active leader
                let leadX = 0;
                if (game.mode === '1P') {
                    leadX = game.activeP1 ? game.players[0].x : game.players[1].x;
                } else {
                    leadX = (game.players[0].x + game.players[1].x) / 2;
                }

                // Smooth scrolling camera interpolation
                const targetCameraX = leadX - 300;
                game.cameraX += (targetCameraX - game.cameraX) * 0.1;
                // Lock boundaries
                if (game.cameraX < 0) game.cameraX = 0;
                const stageMaxX = (game.levelIndex === 0) ? 2100 : 2500; // room 412 distance
                if (game.cameraX > stageMaxX) game.cameraX = stageMaxX;
            }

            // LEVEL 2 ARENA MARCUS UPDATE
            if (game.levelIndex === 1) {
                game.marcus.update();
                if (game.marcus.hp <= 0) {
                    game.lives--;
                    if (game.lives <= 0) {
                        game.state = 'GAMEOVER';
                        sound.playGameOver();
                    } else {
                        initLevel();
                    }
                    return;
                }

                // Wave Spawning Management
                if (game.waveCooldown > 0) {
                    game.waveCooldown--;
                } else {
                    if (game.waveEnemiesSpawned < game.waveEnemiesTotal) {
                        // Spawn an enemy relative to wave configuration
                        let etype = 'USHER';
                        if (game.waveIndex === 2 && game.waveEnemiesSpawned === 3) etype = 'RUNNER';
                        if (game.waveIndex === 3) {
                            etype = (game.waveEnemiesSpawned % 2 === 0) ? 'BRUISER' : 'RUNNER';
                        }
                        
                        // Spawn dynamically on right edge
                        game.enemies.push(new Enemy(etype, CANVAS_WIDTH + 50, FLOOR_Y - 90));
                        game.waveEnemiesSpawned++;
                        game.waveCooldown = 90; // delay between wave spawns
                    }
                }
            }

            // UPDATE ENEMIES
            for (let i = game.enemies.length - 1; i >= 0; i--) {
                const enemy = game.enemies[i];
                enemy.update();

                // Clean up dead enemies
                if (enemy.hp <= 0) {
                    game.enemies.splice(i, 1);
                    continue;
                }
            }

            // UPDATE PARTICLES & EFFECTS
            for (let i = game.particles.length - 1; i >= 0; i--) {
                const p = game.particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                if (p.life <= 0) {
                    game.particles.splice(i, 1);
                }
            }

            for (let i = game.vfxs.length - 1; i >= 0; i--) {
                const fx = game.vfxs[i];
                fx.life--;
                if (fx.life <= 0) {
                    game.vfxs.splice(i, 1);
                }
            }

            // LEVEL PROGRESSION & COMPLETION CRITERIA
            if (!game.levelFinished) {
                if (game.levelIndex === 0) {
                    // Level 1 complete when players reach x > 2600 (Right end of street)
                    if (game.players[0].x > 2650 && game.players[1].x > 2650) {
                        triggerLevelComplete();
                    }
                } else if (game.levelIndex === 1) {
                    // Level 2 complete when all 3 waves are cleared of spawned enemies
                    if (game.waveIndex === 3 && game.enemies.length === 0 && game.waveEnemiesSpawned === game.waveEnemiesTotal) {
                        triggerLevelComplete();
                    } else if (game.enemies.length === 0 && game.waveEnemiesSpawned === game.waveEnemiesTotal && game.waveCooldown === 0) {
                        // Start next wave sequence
                        game.waveCooldown = 150;
                        triggerWave();
                    }
                } else if (game.levelIndex === 2) {
                    // Level 3 complete when players reach the final Room 412 door (x > 3000)
                    if (game.players[0].x > 3020 && game.players[1].x > 3020) {
                        triggerLevelComplete();
                    }
                }
            } else {
                game.levelFinishedTimer++;
                if (game.levelFinishedTimer > 180) { // 3 seconds screen time
                    goToNextLevel();
                }
            }
        }

        function triggerLevelComplete() {
            game.levelFinished = true;
            game.levelFinishedTimer = 0;
            sound.playLevelComplete();
            game.score += 2000; // Level finish clear bonus
        }

        function goToNextLevel() {
            if (game.levelIndex < 2) {
                game.levelIndex++;
                game.state = 'INTERSTITIAL';
                game.interstitialTimer = 180; // 3 seconds interstitial text
            } else {
                // VICTORY SCREEN
                game.state = 'VICTORY';
                sound.playVictory();
                if (game.score > game.highScore) {
                    game.highScore = game.score;
                    localStorage.setItem('salvager_high_score', game.highScore);
                }
            }
        }

        // --- DRAWING / RENDERING PIPELINE ---

        function draw() {
            const ctx = game.ctx;
            ctx.save();

            // Apply camera shake translation
            if (game.screenShake > 0.5) {
                const shakeX = (Math.random() - 0.5) * game.screenShake;
                const shakeY = (Math.random() - 0.5) * game.screenShake;
                ctx.translate(shakeX, shakeY);
            }

            // Clear screen
            ctx.fillStyle = '#020205';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            if (game.state === 'TITLE') {
                drawTitleScreen(ctx);
            } else if (game.state === 'MODESELECT') {
                drawModeSelectScreen(ctx);
            } else if (game.state === 'INTRO') {
                drawIntroScreen(ctx);
            } else if (game.state === 'INTERSTITIAL') {
                drawInterstitialScreen(ctx);
            } else if (game.state === 'PLAYING') {
                drawPlayingState(ctx);
            } else if (game.state === 'VICTORY') {
                drawVictoryScreen(ctx);
            } else if (game.state === 'GAMEOVER') {
                drawGameOverScreen(ctx);
            }

            ctx.restore();

            // Render Fullscreen screen impact red damages flash
            if (game.screenFlash > 0.01) {
                ctx.fillStyle = `rgba(255, 0, 0, ${game.screenFlash})`;
                ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            }
        }

        // TITLE SCREEN
        function drawTitleScreen(ctx) {
            // Draw intro comic panel as background
            drawArt(ctx, artImages.panelIntro, 0, 0, CANVAS_WIDTH, CANVAS_HEIGHT, 0.7);
            // Dark overlay
            ctx.fillStyle = 'rgba(2, 2, 8, 0.55)';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            // Rain overlay
            drawRain(ctx);

            ctx.textAlign = 'center';

            // Neon glowing TITLE
            ctx.shadowBlur = 18;
            ctx.shadowColor = '#00f0ff';
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 64px "Courier New", monospace';
            ctx.fillText("THE SALVAGER", CANVAS_WIDTH / 2, 220);

            // SUBTITLE
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ffaa00';
            ctx.fillStyle = '#ffaa00';
            ctx.font = 'italic 24px "Courier New", monospace';
            ctx.fillText("The Sisters Plea", CANVAS_WIDTH / 2, 270);

            ctx.shadowBlur = 0;
            ctx.fillStyle = '#666688';
            ctx.font = '14px "Courier New", monospace';
            ctx.fillText("A Co-Op Sci-Fi Noir Action-Adventure", CANVAS_WIDTH / 2, 340);

            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 20px "Courier New", monospace';
            ctx.fillText("PRESS ANY KEY / TAP TO START", CANVAS_WIDTH / 2, 430);

            ctx.fillStyle = '#ffaa00';
            ctx.font = '14px "Courier New", monospace';
            ctx.fillText(`HIGH SCORE: ${game.highScore}`, CANVAS_WIDTH / 2, 530);
        }

        // CO-OP MODE SELECT
        function drawModeSelectScreen(ctx) {
            ctx.textAlign = 'center';
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 36px "Courier New", monospace';
            ctx.fillText("CHOOSE YOUR ROAD", CANVAS_WIDTH / 2, 180);

            // 1P Mode Panel
            ctx.fillStyle = game.mode === '1P' ? '#00f0ff' : '#202035';
            ctx.strokeStyle = '#ffffff';
