            ctx.strokeRect(CANVAS_WIDTH / 2 - 220, 260, 180, 100);
            ctx.fillRect(CANVAS_WIDTH / 2 - 220, 260, 180, 100);
            ctx.fillStyle = game.mode === '1P' ? '#020205' : '#ffffff';
            ctx.font = 'bold 22px "Courier New", monospace';
            ctx.fillText("1 PLAYER", CANVAS_WIDTH / 2 - 130, 310);
            ctx.font = '11px "Courier New", monospace';
            ctx.fillText("(TAB swaps partner)", CANVAS_WIDTH / 2 - 130, 335);

            // 2P Mode Panel
            ctx.fillStyle = game.mode === '2P' ? '#ffaa00' : '#202035';
            ctx.lineWidth = game.mode === '2P' ? 3 : 1;
            ctx.strokeRect(CANVAS_WIDTH / 2 + 40, 260, 180, 100);
            ctx.fillRect(CANVAS_WIDTH / 2 + 40, 260, 180, 100);
            ctx.fillStyle = game.mode === '2P' ? '#020205' : '#ffffff';
            ctx.font = 'bold 22px "Courier New", monospace';
            ctx.fillText("2 PLAYERS", CANVAS_WIDTH / 2 + 130, 310);
            ctx.font = '11px "Courier New", monospace';
            ctx.fillText("(Same screen co-op)", CANVAS_WIDTH / 2 + 130, 335);

            // Continue Text
            ctx.fillStyle = '#ffffff';
            ctx.font = '16px "Courier New", monospace';
            ctx.fillText("Press W/S or Arrow Keys to Select | Space / Tap to Confirm", CANVAS_WIDTH / 2, 440);
        }

        // TYPEWRITER STORY INTRO
        function drawIntroScreen(ctx) {
            ctx.textAlign = 'left';
            ctx.fillStyle = '#00f0ff';
            ctx.font = 'bold 24px "Courier New", monospace';
            ctx.fillText("TRANSCRIPTION RECOVERED...", 80, 120);

            // Draw Typewritten dynamic text
            ctx.fillStyle = '#e0e0ed';
            ctx.font = '20px "Courier New", monospace';
            const wrapped = wrapText(ctx, game.introText.substring(0, game.introCharIndex), 740);
            wrapped.forEach((line, index) => {
                ctx.fillText(line, 80, 180 + index * 40);
            });

            if (game.introCharIndex >= game.introText.length) {
                ctx.textAlign = 'center';
                ctx.fillStyle = '#ffaa00';
                ctx.font = 'bold 16px "Courier New", monospace';
                ctx.fillText("PRESS ANY KEY / TAP TO EMBARK", CANVAS_WIDTH / 2, 480);
            }
        }

        // INTERSTITIAL SCREEN BETWEEN LEVELS
        function drawInterstitialScreen(ctx) {
            // Show comic panel for the upcoming level
            let panelImg = null;
            let stageName = "";
            let description = "";
            if (game.levelIndex === 0) {
                panelImg = artImages.panelSisters;
                stageName = "LEVEL 1: HALSTON AVENUE";
                description = "Sneak or punch your way through usher scouts on the rainy street. Reach the right.";
            } else if (game.levelIndex === 1) {
                panelImg = artImages.panelAlley;
                stageName = "LEVEL 2: THE ALLEY";
                description = "Defend injured Marcus behind you! Do not let intruders break through.";
            } else if (game.levelIndex === 2) {
                panelImg = artImages.panelHospital;
                stageName = "LEVEL 3: MERCY GENERAL";
                description = "Corridor Sprint! Race against time to room 412 before security locks down.";
            }

            // Draw comic panel as background
            drawArt(ctx, panelImg, 0, 0, CANVAS_WIDTH, CANVAS_HEIGHT, 0.75);
            // Dark gradient overlay at bottom for text readability
            const grad = ctx.createLinearGradient(0, 0, 0, CANVAS_HEIGHT);
            grad.addColorStop(0, 'rgba(2, 2, 8, 0.4)');
            grad.addColorStop(0.5, 'rgba(2, 2, 8, 0.6)');
            grad.addColorStop(1, 'rgba(2, 2, 8, 0.85)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            ctx.textAlign = 'center';
            ctx.shadowBlur = 12;
            ctx.shadowColor = '#00f0ff';
            ctx.fillStyle = '#00f0ff';
            ctx.font = 'bold 36px "Courier New", monospace';
            ctx.fillText(stageName, CANVAS_WIDTH / 2, 200);

            ctx.shadowBlur = 0;
            ctx.fillStyle = '#e0e0ed';
            ctx.font = '16px "Courier New", monospace';
            const wrapped = wrapText(ctx, description, 700);
            wrapped.forEach((line, index) => {
                ctx.fillText(line, CANVAS_WIDTH / 2, 380 + index * 30);
            });

            ctx.fillStyle = '#666688';
            ctx.font = 'bold 14px "Courier New", monospace';
            ctx.fillText("PREPARING FOR ENCOUNTER...", CANVAS_WIDTH / 2, 480);
        }

        // PLAYING GAMEPLAY STATE
        function drawPlayingState(ctx) {
            // Draw backgrounds depending on levels
            if (game.levelIndex === 0) {
                drawLevel1Background(ctx);
            } else if (game.levelIndex === 1) {
                drawLevel2Background(ctx);
            } else if (game.levelIndex === 2) {
                drawLevel3Background(ctx);
            }

            // Draw Level-specific environmental objects (isometric ground layout)
            ctx.save();
            ctx.translate(-game.cameraX, 0);

            // Draw Marcus on Level 2
            if (game.levelIndex === 1) {
                game.marcus.draw(ctx);
            }

            // Draw Room 412 Door on Level 3
            if (game.levelIndex === 2) {
                ctx.fillStyle = '#ff0033';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#ff0033';
                ctx.fillRect(3050, FLOOR_Y - 120, 60, 120);
                ctx.strokeRect(3050, FLOOR_Y - 120, 60, 120);

                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 15px "Courier New", monospace';
                ctx.fillText("ROOM 412", 3045, FLOOR_Y - 135);
            }

            // Render Sweep Attack Visual FXs
            game.vfxs.forEach(fx => {
                ctx.save();
                ctx.fillStyle = fx.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = fx.color;
                ctx.beginPath();
                if (fx.dir === 1) {
                    ctx.ellipse(fx.x + fx.w/2, fx.y + fx.h/2, fx.w/2, fx.h/2, 0, -Math.PI/2, Math.PI/2);
                } else {
                    ctx.ellipse(fx.x + fx.w/2, fx.y + fx.h/2, fx.w/2, fx.h/2, 0, Math.PI/2, 3*Math.PI/2);
                }
                ctx.fill();
                ctx.restore();
            });

            // Draw enemies
            game.enemies.forEach(enemy => {
                enemy.draw(ctx);
            });

            // Draw players
            game.players.forEach(p => {
                if (p.hp > 0) {
                    p.draw(ctx, game.activeP1);
                }
            });

            // Draw particles
            game.particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 4, 4);
            });

            ctx.restore();

            // Overlay rain for Level 1 on foreground
            if (game.levelIndex === 0) {
                drawRain(ctx);
            }

            // HUD OVERLAYS
            drawHUD(ctx);

            // PAUSE TEXT OVERLAY
            if (game.paused) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
                ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                ctx.textAlign = 'center';
                ctx.fillStyle = '#ffaa00';
                ctx.font = 'bold 36px "Courier New", monospace';
                ctx.fillText("GAME PAUSED", CANVAS_WIDTH/2, CANVAS_HEIGHT/2 - 20);
                ctx.fillStyle = '#ffffff';
                ctx.font = '16px "Courier New", monospace';
                ctx.fillText("Press P to resume, M to Mute", CANVAS_WIDTH/2, CANVAS_HEIGHT/2 + 30);
            }

            // Level Complete Banner Fade Overlay
            if (game.levelFinished) {
                ctx.fillStyle = 'rgba(0, 0, 5, 0.65)';
                ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                ctx.textAlign = 'center';
                ctx.fillStyle = '#00f0ff';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#00f0ff';
                ctx.font = 'bold 42px "Courier New", monospace';
                ctx.fillText("STAGE COMPLETED", CANVAS_WIDTH/2, CANVAS_HEIGHT/2);
                ctx.shadowBlur = 0;
            }
        }

        // LEVEL 1 GRAPHICS
        function drawLevel1Background(ctx) {
            // Draw realistic noir street background image (tiled with camera scroll)
            const bgW = 1200;
            const bgOffset = -(game.cameraX * 0.5) % bgW;
            if (!drawArt(ctx, artImages.bgLevel1, bgOffset, 0, bgW, CANVAS_HEIGHT)) {
                // Fallback: procedural parallax
                game.parallaxLayers.forEach((layer, index) => {
                    ctx.fillStyle = layer.color;
                    layer.rects.forEach(rect => {
                        const drawX = rect.x - game.cameraX * layer.speed;
                        ctx.fillRect(drawX, rect.y, rect.w, rect.h);
                        rect.windows.forEach(win => {
                            if (win.lit) {
                                ctx.fillStyle = win.amber ? '#ffaa00' : '#00f0ff';
                                ctx.fillRect(drawX + win.dx, rect.y + win.dy, 8, 8);
                            }
                        });
                    });
                });
            }
            // Draw a second tile for seamless scrolling
            drawArt(ctx, artImages.bgLevel1, bgOffset + bgW, 0, bgW, CANVAS_HEIGHT);

            // Dark overlay for gameplay visibility
            ctx.fillStyle = 'rgba(2, 2, 8, 0.45)';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            // Street floor layer
            ctx.fillStyle = 'rgba(10, 10, 20, 0.7)';
            ctx.fillRect(0, FLOOR_Y, CANVAS_WIDTH, CANVAS_HEIGHT - FLOOR_Y);
            ctx.strokeStyle = '#22223c';
            ctx.lineWidth = 4;
            ctx.strokeRect(0, FLOOR_Y, CANVAS_WIDTH, CANVAS_HEIGHT - FLOOR_Y);

            // Sidewalk/Curb divider lines
            ctx.fillStyle = '#101020';
            ctx.fillRect(0, FLOOR_Y - 20, CANVAS_WIDTH, 20);

            // Draw glowing Blue Wren neon sign
            ctx.save();
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00f0ff';
            ctx.fillStyle = '#00f0ff';
            ctx.font = 'bold 24px "Courier New", monospace';
            ctx.fillText("BLUE WREN", 700 - game.cameraX * 0.8, 120);
            ctx.restore();

            // Streetlight pools (overlay on image)
            const lightPoints = [400, 1100, 1800, 2500];
            lightPoints.forEach(lx => {
                const drawLx = lx - game.cameraX;
                const grad = ctx.createRadialGradient(drawLx, FLOOR_Y, 10, drawLx, FLOOR_Y, 120);
                grad.addColorStop(0, 'rgba(255, 170, 0, 0.28)');
                grad.addColorStop(1, 'rgba(255, 170, 0, 0.0)');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.ellipse(drawLx, FLOOR_Y, 120, 30, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#202030';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(drawLx, FLOOR_Y - 140);
                ctx.lineTo(drawLx, FLOOR_Y - 20);
                ctx.stroke();
            });
        }

        // LEVEL 2 GRAPHICS
        function drawLevel2Background(ctx) {
            // Draw realistic alley background image
            if (!drawArt(ctx, artImages.bgLevel2, 0, 0, CANVAS_WIDTH, CANVAS_HEIGHT)) {
                // Fallback: procedural brick wall
                ctx.fillStyle = '#07070f';
                ctx.fillRect(0, 0, CANVAS_WIDTH, FLOOR_Y);
                ctx.strokeStyle = '#12121c';
                ctx.lineWidth = 2;
                for (let y = 50; y < FLOOR_Y; y += 30) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(CANVAS_WIDTH, y);
                    ctx.stroke();
                }
            }

            // Dark overlay for gameplay visibility
            ctx.fillStyle = 'rgba(2, 2, 8, 0.5)';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            // Left/Right side columns
            ctx.fillStyle = 'rgba(12, 12, 22, 0.8)';
            ctx.fillRect(0, 0, 80, FLOOR_Y);
            ctx.fillRect(CANVAS_WIDTH - 80, 0, 80, FLOOR_Y);

            // Wet ground
            ctx.fillStyle = 'rgba(10, 10, 20, 0.7)';
            ctx.fillRect(0, FLOOR_Y, CANVAS_WIDTH, CANVAS_HEIGHT - FLOOR_Y);

            // Fire exit metal stairs silhouette
            ctx.strokeStyle = '#1a1a2e';
            ctx.lineWidth = 4;
            ctx.strokeRect(90, 80, 160, 250);
            ctx.beginPath();
            ctx.moveTo(90, 130); ctx.lineTo(250, 190);
            ctx.moveTo(90, 220); ctx.lineTo(250, 280);
            ctx.stroke();

            // Flickering lighting spotlight
            const flicker = Math.random() > 0.06;
            if (flicker) {
                const grad = ctx.createRadialGradient(CANVAS_WIDTH/2, 100, 50, CANVAS_WIDTH/2, 100, 450);
                grad.addColorStop(0, 'rgba(240, 220, 180, 0.12)');
                grad.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(CANVAS_WIDTH/2, 100, 450, 0, Math.PI*2);
                ctx.fill();
            }
        }

        // LEVEL 3 GRAPHICS
        function drawLevel3Background(ctx) {
            // Sterile clinical corridor
            ctx.fillStyle = '#151c24';
            ctx.fillRect(0, 0, CANVAS_WIDTH, FLOOR_Y);

            // Walls panels lines
            ctx.strokeStyle = '#222d3a';
            ctx.lineWidth = 3;
            for (let x = -game.cameraX % 150; x < CANVAS_WIDTH; x += 150) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, FLOOR_Y);
                ctx.stroke();

                // Draw room plaque templates
                ctx.fillStyle = '#ffcc00';
                ctx.fillRect(x + 10, 140, 15, 8);
            }

            // Clinical ceiling fixtures with fluorescent tube glowing or flickering
            for (let x = -game.cameraX % 300; x < CANVAS_WIDTH; x += 300) {
                const isLit = Math.random() > 0.02; // occasional subtle hospital flicker
                ctx.fillStyle = isLit ? '#e0f0ff' : '#222';
                ctx.fillRect(x + 40, 10, 120, 10);
                if (isLit) {
                    ctx.save();
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = '#e0f0ff';
                    ctx.fillStyle = 'rgba(224, 240, 255, 0.18)';
                    ctx.fillRect(x + 20, 20, 160, 280);
                    ctx.restore();
                }
            }

            // Polished reflection clinic floor
            ctx.fillStyle = '#10151c';
            ctx.fillRect(0, FLOOR_Y, CANVAS_WIDTH, CANVAS_HEIGHT - FLOOR_Y);
            ctx.fillStyle = '#080c10';
            ctx.fillRect(0, FLOOR_Y + 10, CANVAS_WIDTH, CANVAS_HEIGHT - FLOOR_Y - 10);
        }

        function drawRain(ctx) {
            ctx.strokeStyle = 'rgba(174, 194, 224, 0.28)';
            ctx.lineWidth = 1.2;
            ctx.beginPath();
            game.rainParticles.forEach(p => {
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(p.x + p.speedX * 0.5, p.y + p.len);
            });
            ctx.stroke();
        }

        // UI HUD
        function drawHUD(ctx) {
            const zeke = game.players[0];
            const maya = game.players[1];

            ctx.save();

            // ZEKE HEALTH BAR (TOP LEFT)
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(20, 20, 200, 24);
            ctx.strokeStyle = '#ffaa00';
            ctx.strokeRect(20, 20, 200, 24);
            
            ctx.fillStyle = '#ffaa00';
            const zekePercent = zeke.hp / zeke.maxHp;
            ctx.fillRect(22, 22, 196 * zekePercent, 20);

            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 12px "Courier New", monospace';
            ctx.fillText(`ZEKE (P1): ${zeke.hp} HP`, 28, 36);

            // MAYA HEALTH BAR (TOP RIGHT)
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(CANVAS_WIDTH - 220, 20, 200, 24);
            ctx.strokeStyle = '#00f0ff';
            ctx.strokeRect(CANVAS_WIDTH - 220, 20, 200, 24);

            ctx.fillStyle = '#00f0ff';
            const mayaPercent = maya.hp / maya.maxHp;
            ctx.fillRect(CANVAS_WIDTH - 218, 22, 196 * mayaPercent, 20);

            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 12px "Courier New", monospace';
            ctx.fillText(`MAYA (P2): ${maya.hp} HP`, CANVAS_WIDTH - 212, 36);

            // LEVEL NAME & LIVES (TOP CENTER)
            ctx.textAlign = 'center';
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 15px "Courier New", monospace';
            let stageName = "HALSTON AVENUE";
            if (game.levelIndex === 1) stageName = "THE ALLEY";
            if (game.levelIndex === 2) stageName = "MERCY GENERAL";
            ctx.fillText(stageName, CANVAS_WIDTH/2, 32);

            ctx.fillStyle = '#ffaa00';
            ctx.font = '12px "Courier New", monospace';
            ctx.fillText(`SHARED LIVES: ${game.lives} | SCORE: ${game.score}`, CANVAS_WIDTH/2, 50);

            // LEVEL 2 DETAILED PROTECTION BAR (MARCUS STATUS)
            if (game.levelIndex === 1 && game.marcus) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(CANVAS_WIDTH/2 - 130, 75, 260, 20);
                ctx.strokeStyle = '#ff3333';
                ctx.strokeRect(CANVAS_WIDTH/2 - 130, 75, 260, 20);
                ctx.fillStyle = '#ff3333';
                ctx.fillRect(CANVAS_WIDTH/2 - 128, 77, 256 * (game.marcus.hp / game.marcus.maxHp), 16);
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 10px "Courier New", monospace';
                ctx.fillText(`PROTECT MARCUS: ${game.marcus.hp}%`, CANVAS_WIDTH/2, 89);
            }

            // LEVEL 3 DETAILED RACE TIMER COUNTDOWN
            if (game.levelIndex === 2) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(CANVAS_WIDTH/2 - 50, 70, 100, 25);
                ctx.strokeStyle = '#ff3333';
                ctx.strokeRect(CANVAS_WIDTH/2 - 50, 70, 100, 25);
                ctx.fillStyle = '#ff0033';
                ctx.font = 'bold 16px "Courier New", monospace';
                ctx.fillText(`00:${game.level3Timer < 10 ? '0' + game.level3Timer : game.level3Timer}`, CANVAS_WIDTH/2, 88);
            }

            // Active companion indicator in Single-Player
            if (game.mode === '1P') {
                ctx.fillStyle = '#ffffff';
                ctx.font = '9px "Courier New", monospace';
                if (game.activeP1) {
                    ctx.fillText("[ACTIVE]", 120, 55);
                    ctx.fillStyle = '#555577';
                    ctx.fillText("[AI COMPANION]", CANVAS_WIDTH - 120, 55);
                } else {
                    ctx.fillStyle = '#555577';
                    ctx.fillText("[AI COMPANION]", 120, 55);
                    ctx.fillStyle = '#ffffff';
                    ctx.fillText("[ACTIVE]", CANVAS_WIDTH - 120, 55);
                }
            }

            ctx.restore();
        }

        // GAME OVER SCREEN
        function drawGameOverScreen(ctx) {
            ctx.textAlign = 'center';
            ctx.fillStyle = '#ff3333';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ff3333';
            ctx.font = 'bold 54px "Courier New", monospace';
            ctx.fillText("MISSION FAILED", CANVAS_WIDTH/2, 220);

            ctx.shadowBlur = 0;
            ctx.fillStyle = '#ffffff';
            ctx.font = '18px "Courier New", monospace';
            ctx.fillText("THE STREETS TOOK THEM IN THE END.", CANVAS_WIDTH/2, 280);
            ctx.fillText(`FINAL RECORDED SCORE: ${game.score}`, CANVAS_WIDTH/2, 330);

            ctx.fillStyle = '#ffaa00';
            ctx.font = 'bold 20px "Courier New", monospace';
            ctx.fillText("PRESS R / TAP SCREEN TO RETRY", CANVAS_WIDTH/2, 420);
        }

        // VICTORY SCREEN
        function drawVictoryScreen(ctx) {
            // Draw victory comic panel
            drawArt(ctx, artImages.panelVictory, 0, 0, CANVAS_WIDTH, CANVAS_HEIGHT, 0.7);
            // Dark overlay
            ctx.fillStyle = 'rgba(2, 2, 8, 0.5)';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            drawRain(ctx);

            ctx.textAlign = 'center';
            ctx.fillStyle = '#00f0ff';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00f0ff';
            ctx.font = 'bold 54px "Courier New", monospace';
            ctx.fillText("CASE CLOSED", CANVAS_WIDTH/2, 190);

            ctx.shadowBlur = 0;
            ctx.fillStyle = '#ffffff';
            ctx.font = '16px "Courier New", monospace';
            const lines = [
                "Room 412 was secure. The doctor was already working on him.",
                "Zeke and Maya slipped out into the cold neon rain.",
                "In this city, you take care of your own.",
                "No matter what the Forum says."
            ];
            lines.forEach((line, index) => {
                ctx.fillText(line, CANVAS_WIDTH/2, 250 + index * 32);
            });

            ctx.fillStyle = '#ffaa00';
            ctx.font = 'bold 22px "Courier New", monospace';
            ctx.fillText(`YOUR TOTAL SCORE: ${game.score}`, CANVAS_WIDTH/2, 410);

            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 15px "Courier New", monospace';
            ctx.fillText("PRESS R / TAP TO RETURN TO TITLE", CANVAS_WIDTH/2, 480);
        }

        // Helper function for wrapping canvas text
        function wrapText(ctx, text, maxWidth) {
            const words = text.split(" ");
            const lines = [];
            let currentLine = words[0];

            for (let i = 1; i < words.length; i++) {
                const word = words[i];
                const width = ctx.measureText(currentLine + " " + word).width;
                if (width < maxWidth) {
                    currentLine += " " + word;
                } else {
                    lines.push(currentLine);
                    currentLine = word;
                }
            }
            lines.push(currentLine);
            return lines;
        }

        // --- CONTROLS / INPUT PIPELINE ---

        window.addEventListener('keydown', e => {
            keys[e.code] = true;

            // Global Key handlers
            if (e.code === 'KeyP') {
                game.paused = !game.paused;
            }
            if (e.code === 'KeyM') {
                sound.toggleMute();
            }

            // Flow transitions depending on state
            if (game.state === 'TITLE') {
                sound.init();
                game.state = 'MODESELECT';
                e.preventDefault();
            } else if (game.state === 'MODESELECT') {
                if (e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'ArrowLeft' || e.code === 'KeyA') {
                    game.mode = '1P';
                }
                if (e.code === 'ArrowDown' || e.code === 'KeyS' || e.code === 'ArrowRight' || e.code === 'KeyD') {
                    game.mode = '2P';
                }
                if (e.code === 'Space' || e.code === 'Enter') {
                    game.state = 'INTRO';
                    game.introCharIndex = 0;
                    game.introTimer = 0;
                }
            } else if (game.state === 'INTRO') {
                if (game.introCharIndex < game.introText.length) {
                    // Skip typing animation
                    game.introCharIndex = game.introText.length;
                } else {
                    game.state = 'INTERSTITIAL';
                    game.interstitialTimer = 180; // 3 seconds screen timer
                }
            } else if (game.state === 'GAMEOVER' || game.state === 'VICTORY') {
                if (e.code === 'KeyR') {
                    if (game.state === 'GAMEOVER') {
                        initGame();
                        game.state = 'PLAYING';
                    } else {
                        game.state = 'TITLE';
                    }
                }
            }

            // Tab toggling companion inside Single player
            if (game.state === 'PLAYING' && game.mode === '1P' && e.code === 'Tab') {
                game.activeP1 = !game.activeP1;
                e.preventDefault(); // prevent shifting browser focus
            }
        });

        window.addEventListener('keyup', e => {
            keys[e.code] = false;
        });

        // --- MOBILE TOUCH CONTROLS INTERACTIVE PIPELINE ---

        // Check user-agent to auto-reveal Touch controls
        function checkMobile() {
            const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
            if (isTouch) {
                game.isMobile = true;
                document.getElementById('mobile-controls').style.display = 'block';
            }
        }

        // Custom touch trackers
        const activeTouches = {};

        function handleJoystick(id, touch, playerIndex) {
            const zone = document.getElementById(id);
            const knob = zone.querySelector('.joystick-knob');
            const rect = zone.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            const dx = touch.clientX - centerX;
            const dy = touch.clientY - centerY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const maxDist = 45;

            let forceX = dx / dist;
            let forceY = dy / dist;
            if (dist < 10) {
                forceX = 0; forceY = 0;
            }

            const moveX = forceX * Math.min(dist, maxDist);
            const moveY = forceY * Math.min(dist, maxDist);
            knob.style.transform = `translate(${moveX}px, ${moveY}px)`;

            // Inject virtual key inputs for player movement
            const player = game.players[playerIndex];
            if (player) {
                player.vx = forceX * player.speed;
                player.vy = forceY * player.speed * 0.6;
                if (forceX > 0.2) player.dir = 1;
                if (forceX < -0.2) player.dir = -1;
            }
        }

        function resetJoystick(id, playerIndex) {
            const knob = document.getElementById(id).querySelector('.joystick-knob');
            knob.style.transform = 'translate(0px, 0px)';
            const player = game.players[playerIndex];
            if (player) {
                player.vx = 0;
                player.vy = 0;
            }
        }

        // Attach touch triggers
        window.addEventListener('touchstart', e => {
            sound.init(); // Init Audio context safely on user touch gesture

            // Manage screen transition buttons for touch
            if (game.state === 'TITLE') {
                game.state = 'MODESELECT';
                return;
            } else if (game.state === 'MODESELECT') {
                // If touching left portion choose 1P, right portion choose 2P, else start
                const touchX = e.touches[0].clientX;
                if (touchX < window.innerWidth / 2) {
                    game.mode = '1P';
                } else {
                    game.mode = '2P';
                }
                game.state = 'INTRO';
                game.introCharIndex = 0;
                game.introTimer = 0;
                return;
            } else if (game.state === 'INTRO') {
                if (game.introCharIndex < game.introText.length) {
                    game.introCharIndex = game.introText.length;
                } else {
                    game.state = 'INTERSTITIAL';
                    game.interstitialTimer = 180;
                }
                return;
            } else if (game.state === 'GAMEOVER') {
                initGame();
                game.state = 'PLAYING';
                return;
            } else if (game.state === 'VICTORY') {
                game.state = 'TITLE';
                return;
            }

            Array.from(e.changedTouches).forEach(touch => {
                const target = touch.target;
                
                // Track button touches
                if (target.id === 'btn-f') {
                    keys['KeyF'] = true;
                } else if (target.id === 'btn-g') {
                    keys['KeyG'] = true;
                } else if (target.id === 'btn-att2') {
                    keys['Period'] = true;
                } else if (target.id === 'btn-dash2') {
                    keys['Slash'] = true;
                }
            });
        });

        window.addEventListener('touchmove', e => {
            Array.from(e.touches).forEach(touch => {
                const target = touch.target;
                // If touch inside joystick zones, calculate coordinates
                if (target.id === 'joystick-p1' || target.closest('#joystick-p1')) {
                    handleJoystick('joystick-p1', touch, 0);
                }
                if (target.id === 'joystick-p2' || target.closest('#joystick-p2')) {
                    handleJoystick('joystick-p2', touch, 1);
                }
            });
        });

        window.addEventListener('touchend', e => {
            Array.from(e.changedTouches).forEach(touch => {
                const target = touch.target;
                if (target.id === 'btn-f') {
                    keys['KeyF'] = false;
                } else if (target.id === 'btn-g') {
                    keys['KeyG'] = false;
                } else if (target.id === 'btn-att2') {
                    keys['Period'] = false;
                } else if (target.id === 'btn-dash2') {
                    keys['Slash'] = false;
                }

                if (target.id === 'joystick-p1' || target.closest('#joystick-p1')) {
                    resetJoystick('joystick-p1', 0);
                }
                if (target.id === 'joystick-p2' || target.closest('#joystick-p2')) {
                    resetJoystick('joystick-p2', 1);
                }
            });
        });

        // --- GAME LOOP PIPELINE ---

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        // Initialize Everything
        checkMobile();
        initParallax();
        initGame();
        loop();

    </script>
